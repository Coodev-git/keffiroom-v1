<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEBUG MODE — KeffiRooms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="./base.css">
<link rel="stylesheet" href="./landing.css">
<style>
/* ── THEME TOKENS ── */
[data-theme="dark"] {
  --bg:#0A0A0A;--bg2:#111;--bg3:#161616;--bg4:#1C1C1C;--card:#141414;
  --t1:#fff;--t2:rgba(255,255,255,.75);--t3:rgba(255,255,255,.45);--t4:rgba(255,255,255,.25);--t5:rgba(255,255,255,.1);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
}
[data-theme="light"] {
  --bg:#F4F7F6;--bg2:#fff;--bg3:#EEF2F0;--bg4:#E4EAE8;--card:#fff;
  --t1:#0D1F1C;--t2:#2D4A45;--t3:#5A7A74;--t4:#8AABA5;--t5:rgba(13,31,28,.08);
  --border:rgba(13,31,28,.1);--border2:rgba(13,31,28,.18);
}

/* EMERGENCY CRASH BANNER */
#emergency-log-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999999;
  background: #DC2626; color: white; font-family: monospace;
  padding: 12px; font-size: 13px; max-height: 150px; overflow-y: auto;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5); display: none;
}

/* RESPONSIVE DESKTOP CONSTRAINT WRAPPERS */
.sl-top, .sl-cards, .sl-footer, .scroll-content-wrap {
  width: 100%; max-width: 460px; margin-left: auto; margin-right: auto; box-sizing: border-box;
}

/* FORCE INTERACTION BYPASS */
.terms-overlay, .sat-overlay { display: none !important; }
.terms-overlay.open, .sat-overlay.open { display: flex !important; }

/* SOCIAL PROOF ROW */
.social-proof { display:flex;align-items:center;gap:0;margin-bottom:6px; }
.sp-avatars { display:flex;margin-right:10px; }
.sp-av {
  width:28px;height:28px;border-radius:50%;border:2px solid #0A0A0A;
  background:linear-gradient(135deg,var(--teal),var(--teal-d));
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:.62rem;font-weight:700;color:white;margin-left:-8px;
}
.sp-av:first-child{margin-left:0;}
.sp-text { font-size:.72rem;color:rgba(255,255,255,.5); }
.sp-text strong { color:rgba(255,255,255,.82);font-weight:600; }
.sp-stars { color:#F59E0B;font-size:.75rem;letter-spacing:1px; }

/* TRUST BADGES ROW */
.trust-badges { display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px; }
.trust-badge {
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:5px 11px;font-size:.7rem;color:rgba(255,255,255,.5);
}

/* FEATURED LISTING CARD */
.feat-wrap { width:100%;max-width:380px;margin:0 auto 28px; }
.feat-card {
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r-xl);overflow:hidden;cursor:pointer;
}
.feat-inner { padding:14px;display:flex;gap:12px;align-items:center; }
.feat-thumb { width:64px;height:64px;border-radius:var(--r);overflow:hidden;flex-shrink:0;background:var(--bg4); }
.feat-thumb img { width:100%;height:100%;object-fit:cover; }
.feat-info { flex:1; }
.feat-area { font-size:.68rem;font-weight:700;color:var(--teal-l);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px; }
.feat-title { font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:rgba(255,255,255,.9);margin-bottom:2px; }
.feat-price { font-size:.78rem;color:rgba(255,255,255,.45); }

/* HOW IT WORKS */
.hiw { padding:0 20px 32px;max-width:420px;margin:0 auto; }
.hiw-title { font-family:'Syne',sans-serif;font-size:1.55rem;font-weight:800;color:var(--t1);margin-bottom:20px; }
.hiw-step { display:flex;gap:14px;margin-bottom:18px;align-items:flex-start; }
.step-num { width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800; }
.step-num.t { background:var(--teal-p);border:1px solid var(--teal-b);color:var(--teal-l); }
.step-num.g { background:var(--gold-p);border:1px solid var(--gold-b);color:var(--gold-l); }
.step-t { font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;color:var(--t1);margin-bottom:3px; }
.step-s { font-size:.78rem;color:var(--t3);line-height:1.6; }

/* STATS STRIP */
.stats-strip { display:flex;justify-content:space-around;width:100%;max-width:380px;border-top:1px solid rgba(255,255,255,.08);padding-top:24px;margin-bottom:32px; }
.stat-item { text-align:center; }
.stat-n { font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;line-height:1; }
.stat-n.t { color:var(--t1); }
.stat-n.g { color:var(--teal-l); }
.stat-n.gld { color:var(--gold-l); }
.stat-l { font-size:.64rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-top:3px; }

/* THEME TOGGLE */
.theme-toggle {
  position:fixed;top:16px;right:16px;z-index:200;width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;
}
</style>
<script>
// TOP-LEVEL FAILSAFE TRAP: Catches runtime crashes before DOM load completes
window.addEventListener('error', function(e) {
  var banner = document.getElementById('emergency-log-banner');
  if(banner) {
    banner.style.display = 'block';
    banner.innerHTML += '<div><strong>[Runtime Error]</strong> ' + e.message + ' at ' + e.filename + ':' + e.lineno + '</div>';
  }
});
</script>
</head>
<body class="landing-page">

<div id="emergency-log-banner"></div>

<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
  <span class="material-symbols-rounded ms" id="theme-icon">light_mode</span>
</button>

<div id="landing-screen">
  <div class="sl-top">
    <div class="sl-logo-wrap">
      <div class="sl-logo"><span class="material-symbols-rounded ms" style="font-size:1.7rem;color:white;">home</span></div>
    </div>
    <div class="sl-wordmark">KEFFI<span class="r">ROOMS</span></div>
    <div class="sl-tagline">NSUK Student Lodges</div>
  </div>

  <div class="sl-cards">
    <button class="sl-card teal" onclick="handleRoleClick('seeker', event)" style="position:relative; z-index:10000; pointer-events:auto !important;">
      <div class="sl-card-text">
        <div class="sl-card-title">I am a Student Seeker (Click Test)</div>
        <div class="sl-card-sub">Browse verified rooms, contact agents securely</div>
      </div>
    </button>
    <button class="sl-card gold" onclick="handleRoleClick('agent', event)" style="position:relative; z-index:10000; pointer-events:auto !important;">
      <div class="sl-card-text">
        <div class="sl-card-title">I am a Property Agent</div>
      </div>
    </button>
  </div>
</div>

<script src="js/db.js" onerror="document.getElementById('emergency-log-banner').style.display='block'; document.getElementById('emergency-log-banner').innerHTML+='<div>[Load Error] Failed to load js/db.js</div>'"></script>
<script src="js/auth.js" onerror="document.getElementById('emergency-log-banner').style.display='block'; document.getElementById('emergency-log-banner').innerHTML+='<div>[Load Error] Failed to load js/auth.js</div>'"></script>

<script>
// LOCAL VARIABLE CONFIGURATION
window.goPage = function(url) { alert('Routing to: ' + url); window.location.href = url; };
window.fmtN = function(num) { return Number(num).toLocaleString(); };
window.nowStr = function() { return new Date().toLocaleString(); };
window.ADMIN_WA = "2340000000000"; 
window.seekerGuest = function() { alert('Routing to Guest Mode'); window.location.href = 'seeker.html?guest=true'; };

if (!window.DB) {
  window.DB = { listings: [], agents: [] };
}

let pendingRole = null;
let termsAccepted = localStorage.getItem('kr6_terms_accepted') === 'true';

document.addEventListener('DOMContentLoaded', () => {
  try {
    applyTheme();
    updateLandingStats();
  } catch(err) {
    var banner = document.getElementById('emergency-log-banner');
    banner.style.display = 'block';
    banner.innerHTML += '<div><strong>[Init Error]</strong> ' + err.message + '</div>';
  }
});

function applyTheme() {
  const theme = localStorage.getItem('kr6_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
}

function toggleTheme() {
  const current = localStorage.getItem('kr6_theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('kr6_theme', next);
  document.documentElement.setAttribute('data-theme', next);
  alert('Theme changed to: ' + next);
}

function updateLandingStats() {
  const listingsArray = (window.DB && window.DB.listings) ? window.DB.listings : [];
  const agentsArray = (window.DB && window.DB.agents) ? window.DB.agents : [];
  console.log('Stats execution validated.', listingsArray.length, agentsArray.length);
}

function handleRoleClick(role, event) {
  alert('Click event caught successfully for role: ' + role);
  if (role === 'seeker') { window.goPage('seeker.html'); }
  if (role === 'agent')  { window.goPage('auth-agent.html'); }
}
</script>
</body>
</html>
