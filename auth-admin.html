<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>KeffiRooms — Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/landing.css">
<style>
[data-theme="dark"]{--bg:#0A0A0A;--bg2:#111;--bg3:#161616;--bg4:#1C1C1C;--t1:#fff;--t2:rgba(255,255,255,.75);--t3:rgba(255,255,255,.45);--t4:rgba(255,255,255,.25);--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);}
[data-theme="light"]{--bg:#F4F7F6;--bg2:#fff;--bg3:#EEF2F0;--bg4:#E4EAE8;--t1:#0D1F1C;--t2:#2D4A45;--t3:#5A7A74;--t4:#8AABA5;--border:rgba(13,31,28,.1);--border2:rgba(13,31,28,.18);}
.secure-notice{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-radius:var(--r);padding:12px 14px;font-size:.74rem;color:#A78BFA;line-height:1.6;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start;}
.secure-notice .ms{font-size:.9rem;flex-shrink:0;margin-top:1px;}
</style>
</head>
<body>
<div class="auth-screen on">
  <div class="auth-nav">
    <button class="auth-back" onclick="goPage('index.html')">
      <span class="material-symbols-rounded ms" style="font-size:.88rem;">arrow_back</span> Back
    </button>
  </div>
  <div class="auth-visual">
    <div class="auth-icon violet">
      <span class="material-symbols-rounded ms" style="font-size:1.6rem;">admin_panel_settings</span>
    </div>
    <div class="auth-visual-title">Admin Access</div>
    <div class="auth-visual-sub">Master credentials only — secured access</div>
  </div>
  <div class="auth-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-label violet">
      <span class="material-symbols-rounded ms" style="font-size:.78rem;">shield</span>
      Admin
    </div>
    <div class="sheet-title">Secure Login</div>
    <div class="sheet-sub">Master admin credentials required to continue.</div>
    <div class="secure-notice">
      <span class="material-symbols-rounded ms">lock</span>
      This portal is restricted to authorised KeffiRooms administrators only. All access attempts are logged.
    </div>
    <div class="fg"><label>Phone or Email</label>
      <input class="fi" type="text" id="adm-id" placeholder="Your registered identity">
    </div>
    <div class="fg">
      <div class="pin-lbl">Master PIN</div>
      <div class="pin-row" id="pin-adm">
        <input class="pb" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(this,0,'pin-adm')">
        <input class="pb" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(this,1,'pin-adm')">
        <input class="pb" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(this,2,'pin-adm')">
        <input class="pb" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(this,3,'pin-adm')">
        <input class="pb" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(this,4,'pin-adm')">
        <input class="pb" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(this,5,'pin-adm')">
      </div>
    </div>
    <button class="btn-primary" onclick="adminLogin()" style="background:linear-gradient(135deg,#7C3AED,#5B21B6);box-shadow:0 4px 16px rgba(124,58,237,.3);">
      <span class="material-symbols-rounded ms" style="font-size:1rem;">verified_user</span>
      Access Admin Panel
    </button>
  </div>
</div>

<div class="toast" id="toast">
  <span class="material-symbols-rounded ms" style="font-size:.9rem;color:var(--teal-l);">check_circle</span>
  <span id="toast-msg">Done</span>
</div>

<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const t = localStorage.getItem('kr6_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
});
</script>
</body>
</html>
